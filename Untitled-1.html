function Contact(){
var ns=useState(''),name=ns[0],setName=ns[1];

function validate(){
var e={};
if(!name.trim())e.name='Name is required';
if(!email.trim())e.email='Email is required';
else if(!/^\S+@\S+\.\S+$/.test(email))e.email='Please enter a valid email';
if(!subject.trim())e.subject='Subject is required';
if(!message.trim())e.message='Message is required';
else if(message.trim().length<10)e.message='Message must be at least 10 characters';
return e;
}
function handleSubmit(e){
e.preventDefault();var v=validate();setErrors(v);
if(Object.keys(v).length===0){setSuccess(true);setName('');setEmail('');setSubject('');setMessage('');
